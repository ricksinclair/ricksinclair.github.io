<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- TV body -->
  <rect x="6" y="14" width="52" height="36" rx="5" fill="#1a1a2e" stroke="#f5c518" stroke-width="2"/>

  <!-- Antennas -->
  <line x1="24" y1="14" x2="18" y2="4" stroke="#f5c518" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="14" x2="46" y2="4" stroke="#f5c518" stroke-width="2" stroke-linecap="round"/>
  <circle cx="18" cy="4" r="1.5" fill="#f5c518"/>
  <circle cx="46" cy="4" r="1.5" fill="#f5c518"/>

  <!-- Screen -->
  <rect x="12" y="19" width="34" height="22" rx="2" fill="#0d0d1f" stroke="#f5c518" stroke-width="1"/>

  <!-- Film sprocket holes down both screen edges -->
  <rect x="13" y="22" width="1.4" height="1.8" rx="0.3" fill="#f5c518"/>
  <rect x="13" y="29.1" width="1.4" height="1.8" rx="0.3" fill="#f5c518"/>
  <rect x="13" y="36.2" width="1.4" height="1.8" rx="0.3" fill="#f5c518"/>
  <rect x="43.6" y="22" width="1.4" height="1.8" rx="0.3" fill="#f5c518"/>
  <rect x="43.6" y="29.1" width="1.4" height="1.8" rx="0.3" fill="#f5c518"/>
  <rect x="43.6" y="36.2" width="1.4" height="1.8" rx="0.3" fill="#f5c518"/>

  <!-- Disc (music) with play triangle (film / start) -->
  <circle cx="29" cy="30" r="7" fill="#1a1a2e" stroke="#f5c518" stroke-width="1"/>
  <circle cx="29" cy="30" r="4.7" fill="none" stroke="#f5c518" stroke-width="0.5"/>
  <path d="M26.8 26.6 L26.8 33.4 L32.4 30 Z" fill="#f5c518"/>

  <!-- Right side bezel: game controller buttons -->
  <circle cx="51" cy="25" r="1.8" fill="#e74c3c"/>
  <circle cx="55" cy="28" r="1.8" fill="#f5c518"/>
  <circle cx="51" cy="31" r="1.8" fill="#2ecc71"/>
  <circle cx="47" cy="28" r="1.8" fill="#3498db"/>

  <!-- TV legs -->
  <line x1="22" y1="50" x2="20" y2="57" stroke="#f5c518" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="50" x2="44" y2="57" stroke="#f5c518" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="57" x2="24" y2="57" stroke="#f5c518" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="57" x2="47" y2="57" stroke="#f5c518" stroke-width="2" stroke-linecap="round"/>
</svg>
